<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Mimpi Nusantara | Premium Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            background: linear-gradient(135deg, #fce7f3 0%, #f3e8ff 50%, #ddd6fe 100%);
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            color: #1e293b;
        }

        #map { 
            height: 60vh; 
            width: 100%; 
            border-radius: 40px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); 
            border: 12px solid rgba(255, 255, 255, 0.6); 
            z-index: 10;
        }

        .dream-marker { 
            background: #f43f5e; 
            border: 2px solid white; 
            border-radius: 50%; 
            animation: pulse-ring 2s infinite; 
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(244, 63, 94, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }

        .btn-main { 
            background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%); 
            transition: all 0.3s ease;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(219, 39, 119, 0.3); }

        .btn-mystery {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.3s ease;
        }
        .btn-mystery:hover { background: rgba(255, 255, 255, 0.6); }

        #dreamModal { opacity: 0; pointer-events: none; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 9999; }
        #dreamModal.active { opacity: 1; pointer-events: auto; }
        
        .btn-delete-dream {
            margin-top: 10px;
            color: #ef4444;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid #fee2e2;
            padding: 4px 10px;
            border-radius: 8px;
            display: inline-block;
            background: #fff;
            transition: all 0.2s;
        }
        .btn-delete-dream:hover { background: #fee2e2; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-12">
            <span class="inline-block bg-white/50 backdrop-blur-md text-pink-600 px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider mb-4 border border-pink-100">✨ Indonesia 2045 Vision</span>
            <h1 class="text-5xl md:text-7xl font-extrabold text-slate-900 tracking-tight">Peta Mimpi</h1>
            <p class="text-slate-600 mt-5 max-w-xl mx-auto text-base md:text-lg leading-relaxed">
                Visualisasi harapan kolektif nusantara. Titik-titik cahaya ini adalah bukti bahwa harapan masih menyala.
            </p>
        </header>

        <main class="relative">
            <div id="map"></div>
            
            <div class="absolute bottom-[-40px] left-1/2 -translate-x-1/2 z-[1000] flex flex-col items-center gap-4 w-full px-4">
                <button onclick="openModal()" class="btn-main text-white px-10 py-5 rounded-2xl font-bold flex items-center gap-3 shadow-2xl w-full max-w-sm justify-center">
                    <span class="text-2xl">🌱</span> 
                    <span class="text-lg">Tanam Mimpimu</span>
                </button>

                <a href="https://deductpursue.com/mz7pf8x12c?key=cbd09e6311e0462040e6195817956dd7" target="_blank" class="btn-mystery px-8 py-3 rounded-xl text-slate-700 text-sm font-semibold shadow-sm flex items-center gap-2">
                    <span>Lihat apa yang terjadi jika mimpimu terwujud hari ini...</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                    </svg>
                </a>
            </div>
        </main>

        <div class="mt-32 grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="bg-white/40 backdrop-blur-md p-6 rounded-3xl border border-white/50 text-center">
                <div class="text-slate-500 text-xs font-bold uppercase mb-2">Sistem</div>
                <div class="font-bold text-pink-500 flex items-center justify-center gap-2">
                    <span class="w-2.5 h-2.5 bg-pink-500 rounded-full animate-ping"></span> Live & Encrypted
                </div>
            </div>
        </div>
    </div>

    <div id="dreamModal" class="fixed inset-0 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-md">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 md:p-12 shadow-2xl overflow-hidden relative">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-pink-400 to-purple-500"></div>
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-slate-800">Tulis Harapan</h2>
                <p class="text-slate-400 mt-2 text-sm">Mimpimu akan menjadi bagian dari sejarah digital nusantara.</p>
            </div>
            
            <textarea id="dreamInput" rows="4" 
                class="w-full p-6 rounded-2xl border-2 border-slate-50 focus:border-pink-400 focus:ring-4 focus:ring-pink-50 outline-none transition-all resize-none text-slate-700 bg-slate-50/50 text-lg" 
                placeholder="Apa satu hal besar yang ingin kamu capai?"></textarea>
            
            <div class="flex flex-col gap-3 mt-8">
                <button id="btnSubmit" onclick="prosesMimpi()" class="w-full btn-main text-white py-5 rounded-2xl font-bold text-lg hover:opacity-90 transition-all">
                    Sematkan Ke Peta ✨
                </button>
                <button onclick="closeModal()" class="w-full py-2 text-slate-400 text-sm font-medium">Batalkan</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkPSJrq4eThM8gA-So7kjCGa11JP0NU1A",
            authDomain: "mimpinusantara.firebaseapp.com",
            databaseURL: "https://mimpinusantara-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mimpinusantara",
            storageBucket: "mimpinusantara.firebasestorage.app",
            messagingSenderId: "1032509154183",
            appId: "1:1032509154183:web:8e56ea292b3486cc4be922"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dreamsRef = ref(db, 'dreams');

        const map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false
        }).setView([-2.5, 118], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        let activeMarkers = {};

        onValue(dreamsRef, (snapshot) => {
            const data = snapshot.val();
            Object.values(activeMarkers).forEach(m => map.removeLayer(m));
            activeMarkers = {};

            if (data) {
                const myKeys = JSON.parse(localStorage.getItem('my_dream_keys')) || [];
                
                Object.keys(data).forEach(id => {
                    const info = data[id];
                    const isMine = myKeys.includes(id); 
                    
                    const icon = L.divIcon({
                        className: 'custom-icon',
                        html: `<div class="dream-marker" style="width:16px;height:16px; ${isMine ? 'background:#7c3aed; border-color:#fff;' : ''}"></div>`,
                        iconSize: [16,16]
                    });

                    const deleteBtn = isMine 
                        ? `<br><button onclick="window.confirmHapus('${id}')" class="btn-delete-dream">Hapus Mimpi Saya</button>` 
                        : '';

                    const popupContent = `
                        <div class="p-2 text-center" style="min-width:150px">
                            <p class="text-slate-700 font-semibold italic">"${info.text}"</p>
                            <div class="mt-2 text-[9px] uppercase tracking-widest text-slate-400 font-bold">
                                ${isMine ? '✨ Mimpimu' : 'Harapan Warga'}
                            </div>
                            ${deleteBtn}
                        </div>
                    `;

                    activeMarkers[id] = L.marker([info.lat, info.lng], { icon })
                        .addTo(map)
                        .bindPopup(popupContent);
                });
            }
        });

        window.confirmHapus = (id) => {
            if(confirm("Apakah kamu ingin menarik kembali mimpi ini dari publik?")) {
                const itemRef = ref(db, `dreams/${id}`);
                remove(itemRef).then(() => {
                    let keys = JSON.parse(localStorage.getItem('my_dream_keys')) || [];
                    keys = keys.filter(k => k !== id);
                    localStorage.setItem('my_dream_keys', JSON.stringify(keys));
                }).catch((error) => alert("Gagal menghapus: " + error.message));
            }
        };

        window.prosesMimpi = async () => {
            const text = document.getElementById('dreamInput').value;
            const btnSubmit = document.getElementById('btnSubmit');
            
            if (!text.trim()) return alert("Tuliskan mimpimu dulu...");

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = "Mencari Lokasi... 🛰️";

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    simpanMimpi(text, pos.coords.latitude, pos.coords.longitude);
                },
                (err) => {
                    btnSubmit.disabled = false;
                    btnSubmit.innerHTML = "Sematkan Ke Peta ✨";
                    alert("Gagal mendeteksi lokasi. Pastikan GPS aktif.");
                },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        };

        function simpanMimpi(text, lat, lng) {
            const newRef = push(dreamsRef);
            const payload = { text, lat, lng, time: Date.now() };
            
            set(newRef, payload).then(() => {
                let keys = JSON.parse(localStorage.getItem('my_dream_keys')) || [];
                keys.push(newRef.key);
                localStorage.setItem('my_dream_keys', JSON.stringify(keys));
                
                document.getElementById('dreamInput').value = "";
                document.getElementById('btnSubmit').disabled = false;
                document.getElementById('btnSubmit').innerHTML = "Sematkan Ke Peta ✨";
                
                closeModal();
                map.flyTo([lat, lng], 12);
            });
        }

        window.openModal = () => {
            document.getElementById('dreamModal').classList.add('active');
            setTimeout(() => document.getElementById('dreamInput').focus(), 300);
        };
        window.closeModal = () => document.getElementById('dreamModal').classList.remove('active');
    </script>

    <script src="https://deductpursue.com/48/cf/ee/48cfeecf17e3bc0d49659bbc3994d57b.js"></script>
</body>
</html>
